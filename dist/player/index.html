<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CarryOkie player</title>  <script type="module" crossorigin src="../assets/main2.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/styles.css">
</head><body><div id="app" data-page="player"></div><script>(()=>{const host=location.hostname; const parts=location.pathname.replace(/\/index\.html$/,'/').split('/').filter(Boolean); if(!host.endsWith('github.io')||parts.includes('dist')) return; const page=parts.at(-1); if(!page) return; location.replace(`${location.origin}/${[...parts.slice(0,-1),'dist',page,''].join('/')}${location.search}${location.hash}`);})();</script></body></html>
